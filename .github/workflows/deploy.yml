name: Deploy life-os

on:
  push:
    branches: [main]

jobs:
  build-check:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_LOCAL_BACKEND_URL: ${{ secrets.LOCAL_BACKEND_URL }}
          NEXT_PUBLIC_PROD_BACKEND_URL: ${{ secrets.PROD_BACKEND_URL }}
        run: npm run build

  deploy:
    runs-on: self-hosted
    needs: build-check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t life-os-backend:latest .

      - name: Build frontend image
        env:
          LOCAL_BACKEND_URL: ${{ secrets.LOCAL_BACKEND_URL }}
          PROD_BACKEND_URL: ${{ secrets.PROD_BACKEND_URL }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_LOCAL_BACKEND_URL="$LOCAL_BACKEND_URL" \
            --build-arg NEXT_PUBLIC_PROD_BACKEND_URL="$PROD_BACKEND_URL" \
            -t life-os-frontend:latest \
            -f frontend/Dockerfile .

      - name: Redeploy Portainer stack
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_TOKEN: ${{ secrets.PORTAINER_TOKEN }}
        run: |
          STACK=$(curl -sk \
            -H "X-API-Key: $PORTAINER_TOKEN" \
            "$PORTAINER_URL/api/stacks" \
            | jq '.[] | select(.Name=="life-os")')

          STACK_ID=$(echo "$STACK" | jq '.Id')
          ENDPOINT_ID=$(echo "$STACK" | jq '.EndpointId')

          STACK_FILE=$(curl -sk \
            -H "X-API-Key: $PORTAINER_TOKEN" \
            "$PORTAINER_URL/api/stacks/$STACK_ID/file")

          REQUEST_BODY=$(echo "$STACK_FILE" | jq '{pullImage: false, prune: false, stackFileContent: .StackFileContent}')

          curl -sk -X PUT \
            -H "X-API-Key: $PORTAINER_TOKEN" \
            -H "Content-Type: application/json" \
            "$PORTAINER_URL/api/stacks/$STACK_ID?endpointId=$ENDPOINT_ID" \
            -d "$REQUEST_BODY"